<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPark – Đăng Nhập</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0e1a;
    --surface:  #111827;
    --surface2: #1a2235;
    --border:   #1f2d45;
    --accent:   #00d9ff;
    --green:    #00e676;
    --red:      #ff3d5a;
    --text:     #e8edf5;
    --muted:    #6b7a99;
    --font:     'Syne', sans-serif;
    --mono:     'Space Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .left-panel {
    flex: 1;
    background: linear-gradient(135deg, #0d1829 0%, #0a1628 50%, #071020 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    position: relative;
    overflow: hidden;
  }

  /* animated grid bg */
  .left-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,217,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,217,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    from { background-position: 0 0; }
    to   { background-position: 48px 48px; }
  }

  .left-content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 400px;
  }

  .brand-logo {
    width: 72px; height: 72px;
    background: var(--accent);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
    box-shadow: 0 0 40px rgba(0,217,255,0.3);
  }

  .brand-name {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .brand-name span { color: var(--accent); }

  .brand-sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 48px;
  }

  /* Mini parking grid visual */
  .mini-grid {
    display: grid;
    grid-template-columns: repeat(8, 28px);
    gap: 4px;
    margin-bottom: 32px;
  }

  .mini-slot {
    width: 28px; height: 20px;
    border-radius: 4px;
    animation: blink var(--d, 3s) var(--del, 0s) infinite;
  }

  .mini-slot.e {
    background: rgba(0,230,118,0.25);
    border: 1px solid rgba(0,230,118,0.4);
  }

  .mini-slot.f {
    background: rgba(255,61,90,0.25);
    border: 1px solid rgba(255,61,90,0.4);
    --d: 4s;
  }

  @keyframes blink {
    0%,90%,100% { opacity: 1; }
    95% { opacity: 0.3; }
  }

  .version-tag {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
  }

  /* RIGHT PANEL */
  .right-panel {
    width: 460px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 48px;
    border-left: 1px solid var(--border);
  }

  .login-box {
    width: 100%;
    max-width: 360px;
  }

  .login-title {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .login-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  /* Role selector */
  .role-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .role-btn {
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: var(--font);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .role-btn .role-icon { font-size: 22px; display: block; margin-bottom: 6px; }

  .role-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .role-btn.active {
    border-color: var(--accent);
    background: rgba(0,217,255,0.08);
    color: var(--accent);
  }

  /* Form */
  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
    font-family: var(--mono);
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  input::placeholder { color: var(--muted); }

  /* CAPTCHA */
  .captcha-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .captcha-box {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 6px;
    text-align: center;
    user-select: none;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .captcha-box::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: rgba(0,217,255,0.2);
    transform: rotate(-3deg);
  }

  .captcha-refresh {
    width: 40px; height: 40px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 16px;
  }

  .captcha-refresh:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-login-submit {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-login-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,217,255,0.3);
  }

  .btn-login-submit:active {
    transform: translateY(0);
  }

  .btn-login-submit.loading::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 1s infinite;
  }

  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  .error-msg {
    background: rgba(255,61,90,0.12);
    border: 1px solid rgba(255,61,90,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
    display: none;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--accent); }

  @media (max-width: 800px) {
    .left-panel { display: none; }
    .right-panel {
      width: 100%;
      border-left: none;
    }
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
  <div class="left-content">
    <div class="brand-logo">🅿</div>
    <div class="brand-name">Smart<span>Park</span></div>
    <div class="brand-sub">Hệ thống quản lý bãi đỗ xe thông minh<br>Theo dõi & điều phối theo thời gian thực</div>

    <div class="mini-grid" id="mini-grid"></div>
    <div class="version-tag">v1.0.0 · Build 2025</div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="login-box">
    <div class="login-title">Đăng nhập</div>
    <div class="login-sub">Chọn vai trò và nhập thông tin tài khoản</div>

    <!-- Role Selector -->
    <div class="role-select">
      <button class="role-btn active" id="role-staff" onclick="selectRole('staff')">
        <span class="role-icon">👤</span>
        Nhân viên
      </button>
      <button class="role-btn" id="role-admin" onclick="selectRole('admin')">
        <span class="role-icon">⚙️</span>
        Admin
      </button>
    </div>

    <!-- Username -->
    <div class="form-group">
      <label>Tên đăng nhập</label>
      <input type="text" id="username" placeholder="Nhập tài khoản...">
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <!-- CAPTCHA -->
    <div class="form-group">
      <label>Xác minh CAPTCHA</label>
      <div class="captcha-row">
        <div class="captcha-box" id="captcha-display"></div>
        <div class="captcha-refresh" onclick="genCaptcha()" title="Tạo mã mới">↻</div>
      </div>
      <div style="margin-top:8px">
        <input type="text" id="captcha-input" placeholder="Nhập mã captcha ở trên">
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-login-submit" id="btn-submit" onclick="doLogin()">
      Đăng nhập →
    </button>

    <div class="error-msg" id="error-msg">⚠️ Tên đăng nhập, mật khẩu hoặc captcha không đúng.</div>

    <a href="public-map.html" class="back-link">← Xem bãi xe không cần đăng nhập</a>
  </div>
</div>

<script>
// Mini grid animation
const grid = document.getElementById('mini-grid');
for (let i = 0; i < 32; i++) {
  const d = document.createElement('div');
  d.className = 'mini-slot ' + (Math.random() > 0.45 ? 'f' : 'e');
  d.style.setProperty('--del', (Math.random()*5).toFixed(1)+'s');
  grid.appendChild(d);
}

// Role selection
let currentRole = 'staff';
function selectRole(r) {
  currentRole = r;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('role-'+r).classList.add('active');
}

// CAPTCHA
let captchaVal = '';
function genCaptcha() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  captchaVal = Array.from({length:5}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  document.getElementById('captcha-display').textContent = captchaVal;
  document.getElementById('captcha-input').value = '';
}
genCaptcha();

// Login
async function doLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const cap  = document.getElementById('captcha-input').value.trim().toUpperCase();
  const err  = document.getElementById('error-msg');

  err.style.display = 'none';

  if (cap !== captchaVal) {
    err.textContent = '⚠️ Mã CAPTCHA không đúng. Vui lòng thử lại.';
    err.style.display = 'block';
    genCaptcha();
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.textContent = 'Đang xác thực...';
  btn.classList.add('loading');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();

    if (!data.success) {
      err.textContent = '⚠️ Tên đăng nhập hoặc mật khẩu không đúng.';
      err.style.display = 'block';
      btn.textContent = 'Đăng nhập →';
      btn.classList.remove('loading');
      genCaptcha();
      return;
    }

    // Lưu thông tin session
    sessionStorage.setItem('role',      data.role);
    sessionStorage.setItem('name',      data.name);
    sessionStorage.setItem('staffCode', data.staffCode);

    btn.textContent = 'Đang vào hệ thống...';
    setTimeout(() => {
      window.location.href = data.role === 'admin' ? 'admin-dashboard.html' : 'staff-dashboard.html';
    }, 800);
  } catch (e) {
    err.textContent = '⚠️ Không thể kết nối server. Vui lòng thử lại.';
    err.style.display = 'block';
    btn.textContent = 'Đăng nhập →';
    btn.classList.remove('loading');
  }
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
